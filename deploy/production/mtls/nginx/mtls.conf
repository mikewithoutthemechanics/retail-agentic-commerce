# nginx mTLS server snippet for service-to-service encryption.
#
# Mounted into the nginx container (replaces the plain-text upstreams in
# nginx.conf for east-west traffic). Clients (other services / the ingress)
# must present a certificate signed by the Agentic Commerce CA
# (see scripts/issue-certs.sh). Use this in front of merchant/psp/apps-sdk/ui
# when mTLS is the east-west transport (GitOps + managed-DB production profile).

# Trust store: the CA root issued by step-ca (ca-bundle.crt).
ssl_client_certificate /etc/nginx/tls/ca-bundle.crt;
ssl_verify_client on;                 # require + verify client certs
ssl_verify_depth 2;

ssl_protocols TLSv1.3 TLSv1.2;
ssl_prefer_server_ciphers on;

# Per-service upstreams now speak HTTPS with the service cert.
upstream merchant_tls {
  server merchant.acp.svc.cluster.local:8443;
}
upstream psp_tls {
  server psp.acp.svc.cluster.local:8441;
}
upstream apps_sdk_tls {
  server apps-sdk.acp.svc.cluster.local:8443;
}

server {
  listen 8443 ssl;
  server_name acp-mesh.local;

  ssl_certificate     /etc/nginx/tls/nginx.crt;
  ssl_certificate_key /etc/nginx/tls/nginx.key;

  # Reject any caller that is not part of the mesh.
  if ($ssl_client_verify != SUCCESS) {
    return 403;
  }

  location /merchant/ {
    proxy_pass https://merchant_tls/;
    proxy_ssl_trusted_certificate /etc/nginx/tls/ca-bundle.crt;
    proxy_ssl_verify on;
    proxy_set_header X-Client-Cert $ssl_client_escaped_cert;
  }

  location /psp/ {
    proxy_pass https://psp_tls/;
    proxy_ssl_trusted_certificate /etc/nginx/tls/ca-bundle.crt;
    proxy_ssl_verify on;
  }

  location /apps-sdk/ {
    proxy_pass https://apps_sdk_tls/;
    proxy_ssl_trusted_certificate /etc/nginx/tls/ca-bundle.crt;
    proxy_ssl_verify on;
  }
}
