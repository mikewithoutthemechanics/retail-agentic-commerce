apiVersion: apps/v1
kind: Deployment
metadata:
  name: apps-sdk
  namespace: acp
  labels:
    app.kubernetes.io/name: apps-sdk
    app.kubernetes.io/part-of: agentic-commerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: apps-sdk
  template:
    metadata:
      labels:
        app.kubernetes.io/name: apps-sdk
        app.kubernetes.io/part-of: agentic-commerce
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: apps-sdk
          image: ghcr.io/mikewithoutthemechanics/retail-agentic-commerce/apps-sdk:__IMAGE_TAG__
          ports:
            - containerPort: 2091
          envFrom:
            - configMapRef:
                name: acp-common
            - secretRef:
                name: acp-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 2091
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 2091
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: apps-sdk
  namespace: acp
  labels:
    app.kubernetes.io/name: apps-sdk
    app.kubernetes.io/part-of: agentic-commerce
spec:
  selector:
    app.kubernetes.io/name: apps-sdk
  ports:
    - name: http
      port: 2091
      targetPort: 2091
