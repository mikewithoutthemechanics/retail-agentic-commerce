apiVersion: v1
kind: ConfigMap
metadata:
  name: acp-common
  namespace: acp
  labels:
    app.kubernetes.io/part-of: agentic-commerce
data:
  LOG_LEVEL: "INFO"
  # Service-to-service URLs use the in-cluster DNS names. When mTLS is enabled
  # (see ../../mtls) these become https:// and a CA bundle is mounted.
  MERCHANT_API_URL: "http://merchant.acp.svc.cluster.local:8000"
  PSP_API_URL: "http://psp.acp.svc.cluster.local:8001"
  PROMOTION_AGENT_URL: "http://promotion-agent.acp.svc.cluster.local:8002"
  POST_PURCHASE_AGENT_URL: "http://post-purchase-agent.acp.svc.cluster.local:8003"
  RECOMMENDATION_AGENT_URL: "http://recommendation-agent.acp.svc.cluster.local:8004"
  SEARCH_AGENT_URL: "http://search-agent.acp.svc.cluster.local:8005"
  WEBHOOK_URL: "http://ui.acp.svc.cluster.local:3000/api/webhooks/acp"
  UCP_ORDER_WEBHOOK_URL: "http://ui.acp.svc.cluster.local:3000/api/webhooks/ucp"
