apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: acp
  labels:
    app.kubernetes.io/name: ui
    app.kubernetes.io/part-of: agentic-commerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ui
        app.kubernetes.io/part-of: agentic-commerce
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ui
          image: ghcr.io/mikewithoutthemechanics/retail-agentic-commerce/ui:__IMAGE_TAG__
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: acp-common
            - secretRef:
                name: acp-secrets
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: ui
  namespace: acp
  labels:
    app.kubernetes.io/name: ui
    app.kubernetes.io/part-of: agentic-commerce
spec:
  selector:
    app.kubernetes.io/name: ui
  ports:
    - name: http
      port: 3000
      targetPort: 3000
