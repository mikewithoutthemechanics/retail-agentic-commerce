apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: acp-staging
namePrefix: staging-

resources:
  - ../../base

# Staging: smaller footprint, promoted image tag.
replicas:
  - name: merchant
    count: 1
  - name: psp
    count: 1
  - name: apps-sdk
    count: 1
  - name: ui
    count: 1

images:
  - name: ghcr.io/mikewithoutthemechanics/retail-agentic-commerce/merchant
    newTag: staging
  - name: ghcr.io/mikewithoutthemechanics/retail-agentic-commerce/psp
    newTag: staging
  - name: ghcr.io/mikewithoutthemechanics/retail-agentic-commerce/apps-sdk
    newTag: staging
  - name: ghcr.io/mikewithoutthemechanics/retail-agentic-commerce/ui
    newTag: staging
