name: gitops-validate

on:
  pull_request:
    paths:
      - "deploy/production/**"
      - "docker-compose*.yml"
      - ".github/workflows/gitops-validate.yml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate shell scripts (syntax)
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in deploy/production/mtls/scripts/*.sh; do
            echo "bash -n $f"
            bash -n "$f"
          done

      - name: Validate Docker Compose overrides
        run: |
          set -euo pipefail
          docker compose version
          docker compose -f docker-compose.infra.yml -f docker-compose.yml config >/dev/null
          docker compose -f docker-compose.infra.yml -f docker-compose.yml \
            -f deploy/production/managed-db/docker-compose.managed-db.yml config >/dev/null
          docker compose -f docker-compose.infra.yml -f docker-compose.yml \
            -f deploy/production/mtls/docker-compose.mtls.yml config >/dev/null

      - name: Install kubectl + kustomize
        uses: azure/setup-kubectl@v4
      - uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.4.3"

      - name: Render Kustomize overlays
        run: |
          set -euo pipefail
          for env in staging production; do
            echo "== overlay: $env =="
            kustomize build "deploy/production/gitops/overlays/$env" > "/tmp/$env.yaml"
            echo "rendered $(grep -c '^kind:' /tmp/$env.yaml) resources"
          done

      - name: Validate rendered Kubernetes manifests
        run: |
          set -euo pipefail
          kubectl --dry-run=client apply -f /tmp/staging.yaml >/dev/null
          kubectl --dry-run=client apply -f /tmp/production.yaml >/dev/null
