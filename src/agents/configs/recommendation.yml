# =============================================================================
# ARAG: Agentic Retrieval-Augmented Generation for Personalized Recommendation
# =============================================================================
#
# Workflow architecture:
#
#                           ┌──→ NLI Agent ─┐
#   User Query → RAG Retriever ──┤           ├──→ Context Summary Agent ─→ Item Ranker → Output Guard
#                           └──→ UUA Agent ─┘
#
# Parallel execution is retained for UUA and NLI (paper-aligned), while
# deterministic Python logic is limited to retrieval adaptation, typed chat
# adaptation, and output contract validation.
general:
  use_uvloop: true
  telemetry:
    logging:
      console:
        _type: console
        level: info
    tracing:
      phoenix:
        _type: phoenix
        project: "arag-recommendations"
        endpoint: ${PHOENIX_ENDPOINT:-http://localhost:6006/v1/traces}

llms:
  nim_llm:
    _type: nim
    base_url: ${NIM_LLM_BASE_URL:-https://integrate.api.nvidia.com/v1}
    model_name: ${NIM_LLM_MODEL_NAME:-nvidia/nemotron-3-nano-30b-a3b}
    temperature: 0.1
    max_tokens: 512
    chat_template_kwargs:
      enable_thinking: false
  nim_llm_nli:
    _type: nim
    base_url: ${NIM_LLM_BASE_URL:-https://integrate.api.nvidia.com/v1}
    model_name: ${NIM_LLM_MODEL_NAME:-nvidia/nemotron-3-nano-30b-a3b}
    temperature: 0.0
    max_tokens: 640
    chat_template_kwargs:
      enable_thinking: false

  # -- Evaluation LLMs (judge model, not the main workflow) --------------------
  # Uses a larger model than the agent for unbiased evaluation scoring
  nim_eval_llm:
    _type: nim
    model_name: meta/llama-3.1-70b-instruct
    temperature: 0.0
    max_tokens: 1024
  nim_trajectory_eval_llm:
    _type: nim
    model_name: meta/llama-3.1-70b-instruct
    temperature: 0.0
    max_tokens: 2048

embedders:
  product_embedder:
    _type: nim
    base_url: ${NIM_EMBED_BASE_URL:-https://integrate.api.nvidia.com/v1}
    model_name: ${NIM_EMBED_MODEL_NAME:-nvidia/nv-embedqa-e5-v5}
    truncate: "END"

retrievers:
  product_retriever:
    _type: milvus_retriever
    uri: ${MILVUS_URI:-http://localhost:19530}
    collection_name: "product_catalog"
    embedding_model: product_embedder
    top_k: 10

  graph_retriever:
    _type: milvus_retriever
    uri: ${MILVUS_URI:-http://localhost:19530}
    collection_name: "product_catalog_graph"
    embedding_model: product_embedder
    top_k: 10

functions:
  # -- Step 1: RAG retrieval setup ---------------------------------------------
  product_search:
    _type: nat_retriever
    retriever: product_retriever
    topic: Search product catalog for items matching the shopping context

  # Adapter that turns recommendation payload into retriever query + candidates
  rag_retriever:
    _type: rag_retriever
    retrieval_tool_name: product_search
    top_k: 10
    multi_source: true
    secondary_retrievers: [graph_search]

  graph_search:
    _type: nat_retriever
    retriever: graph_retriever
    topic: Search product graph for relationship-aware recommendations

  # -- Step 2a: NLI Agent (LLM) ------------------------------------------------
  nli_agent_chat:
    _type: chat_completion
    llm_name: nim_llm_nli
    system_prompt: |
      You are the NLI alignment stage in an ARAG recommendation pipeline.

      INPUT:
      JSON from rag_retriever with:
      - user_query
      - cart_items
      - session_context
      - candidates: [{product_id,product_name,category,description}]

      TASK:
      Score candidate alignment with user intent on a continuous scale:
      - Strong fit: 0.8-1.0
      - Moderate fit: 0.4-0.7
      - Weak fit: 0.0-0.3

      RULES:
      - Evaluate only the first 10 candidates by input order.
      - Keep exact product_id and product_name.
      - Return at most 10 objects in scored_candidates.
      - Preserve original candidate order in scored_candidates.
      - Include only keys requested below.
      - Use compact JSON formatting (no extra whitespace/newlines).
      - alignment_score must use one decimal place (for example: 0.8).

      Return ONLY valid JSON (no markdown, no prose):
      {
        "user_query": "<the original query>",
        "cart_product_ids": ["<product id from cart>"],
        "candidates_received": <total input candidates>,
        "scored_candidates": [
          {
            "product_id": "<exact product_id>",
            "product_name": "<exact product_name>",
            "category": "<item category>",
            "alignment_score": 0.0
          }
        ]
      }

  nli_agent:
    _type: text_function_adapter
    function_name: nli_agent_chat
    description: "Run NLI alignment and return text output"

  # -- Step 2b: User Understanding Agent (LLM, parallel with NLI) -------------
  user_understanding_agent_chat:
    _type: chat_completion
    llm_name: nim_llm
    system_prompt: |
      You are the user understanding stage in an ARAG recommendation pipeline.

      INPUT:
      JSON from rag_retriever with user_query, cart_items, session_context, candidates.
      Use cart_items and session_context.browse_history for intent inference.
      Ignore price_range_viewed and any price-range fields if present.

      TASK:
      Infer concise user intent for downstream ranking.
      Keep user_intent grounded only in provided cart/session/candidate signals.
      Return max 2 items for style_preferences and max 2 for complementary_categories.

      Return ONLY valid JSON (no markdown, no prose):
      {
        "user_query": "<the original query>",
        "user_intent": "<one sentence summary of shopper intent>",
        "style_preferences": ["<pref1>", "<pref2>"],
        "complementary_categories": ["<category1>", "<category2>"]
      }

  user_understanding_agent:
    _type: text_function_adapter
    function_name: user_understanding_agent_chat
    description: "Infer shopper intent and return text output"

  # -- Step 3: Context Summary Agent (LLM) ------------------------------------
  context_summary_agent_chat:
    _type: chat_completion
    llm_name: nim_llm
    system_prompt: |
      You are the context synthesis stage in an ARAG recommendation pipeline.

      INPUT:
      Text from NAT's built-in parallel_executor. It contains labeled blocks:
      - "user_understanding_agent:" followed by that agent's JSON output
      - "nli_agent:" followed by that agent's JSON output

      First split the text by those exact labels, then parse each block body
      as JSON. If a block starts with "ERROR:" or is not parseable JSON, treat
      that branch as missing and continue with the available branch data.
      If user_understanding_agent is missing, set user_intent to
      "Shopper intent unavailable." and treat complementary_categories as empty.
      If nli_agent is missing, return zero candidates with an empty
      filtered_candidates list.

      TASK:
      1) Copy user_intent from user_understanding_agent.user_intent.
      2) Derive cart_categories from cart_items[*].category (unique).
      3) Derive complementary_categories from user_understanding_agent
         (defaults to [] when missing).
      4) Build primary_candidates from nli_agent.scored_candidates where
         alignment_score > 0.7 and product_id is not in cart_product_ids.
      5) If primary_candidates has fewer than 3 items, backfill with
         highest-scoring remaining non-cart candidates until reaching 3
         (or exhaust candidates).
      6) Score every candidate in filtered_candidates on cross_sell_fit using
         the rule below, then keep only: product_id, product_name, category,
         alignment_score, cross_sell_fit.

         cross_sell_fit rule (deterministic, applied per candidate.category):
         - HIGH (0.8-1.0): category appears in complementary_categories
                           AND is not in cart_categories.
         - MEDIUM (0.4-0.7): category appears in neither complementary_categories
                             nor cart_categories (genre-adjacent, neutral fit).
         - LOW (0.0-0.3): category appears in cart_categories
                          (upsell/similar, not a true cross-sell).
         - When complementary_categories is empty, use MEDIUM as the default
           and add 0.1 to HIGH and LOW caps (so the range still discriminates
           between in-cart and out-of-cart categories).

      7) Set after_alignment_filter = number of primary_candidates.
      8) Keep at most 4 filtered_candidates. Sort by:
         (cross_sell_fit DESC, alignment_score DESC).
         Tie-break: preserve original candidate order.

      Diversity rule: prefer distinct categories when possible, but never
      reduce below 3 when 3+ non-cart candidates exist.

      Output must be compact JSON (no markdown, no extra keys, no pretty-printing).

      Return ONLY valid JSON (no markdown, no prose):
      {
        "user_query": "<from nli_agent.user_query>",
        "user_intent": "<from user_understanding_agent.user_intent>",
        "candidates_received": <from nli_agent.candidates_received>,
        "after_alignment_filter": <number>,
        "filtered_candidates": [
          {
            "product_id": "<exact product_id>",
            "product_name": "<exact product_name>",
            "category": "<item category>",
            "alignment_score": 0.0,
            "cross_sell_fit": 0.0
          }
        ]
      }

  context_summary_agent:
    _type: text_function_adapter
    function_name: context_summary_agent_chat
    description: "Synthesize parallel analysis output into text JSON"

  # -- Step 4: Item Ranker Agent (LLM) ----------------------------------------
  item_ranker_agent_chat:
    _type: chat_completion
    llm_name: nim_llm
    system_prompt: |
      You are the final ranker stage in an ARAG recommendation pipeline.

      INPUT:
      JSON from context_summary_agent with:
      - user_query
      - user_intent
      - candidates_received
      - after_alignment_filter
      - filtered_candidates[*].{product_id,product_name,category,alignment_score,cross_sell_fit}

      TASK:
      - Rank up to 3 items from filtered_candidates.
      - If filtered_candidates has 3 or more items, return exactly 3 recommendations.
      - If fewer than 3 items exist, return all available items.
      - Primary sort key: cross_sell_fit DESC.
      - Secondary sort key: alignment_score DESC.
      - Diversity rule (applied after sorting): when adjacent items share the
        same category AND a later item has a different category, swap so that
        the later item is promoted over its same-category predecessor unless
        that predecessor's cross_sell_fit exceeds the later item's cross_sell_fit
        by more than 0.2. Never reduce result count below 3 when 3+ items exist.
      - Use exact product_id and product_name from filtered_candidates.
      - Reasoning: one short sentence per item, maximum 12 words, that may
        reference cross_sell_fit or alignment_score when natural.

      Tie-break rule when candidates are equivalent on both sort keys:
      preserve input order.
      Output must be compact JSON (no markdown, no extra keys, no pretty-printing).

      Return ONLY valid JSON (no markdown, no prose):
      {
        "recommendations": [
          {
            "product_id": "<exact product_id>",
            "product_name": "<exact product_name>",
            "rank": 1,
            "reasoning": "short explanation"
          }
        ],
        "user_intent": "<from input user_intent>",
        "pipeline_trace": {
          "candidates_received": <from input candidates_received>,
          "after_alignment_filter": <from input after_alignment_filter>,
          "final_ranked": <number of returned recommendations>
        }
      }

      If there are no suitable recommendations, return:
      {
        "recommendations": [],
        "user_intent": "<from input user_intent>",
        "pipeline_trace": {
          "candidates_received": <from input candidates_received>,
          "after_alignment_filter": <from input after_alignment_filter>,
          "final_ranked": 0
        },
        "message": "No suitable cross-sell recommendations for current cart"
      }

  item_ranker_agent:
    _type: text_function_adapter
    function_name: item_ranker_agent_chat
    description: "Rank filtered candidates and return text JSON"

  # -- Step 5: Deterministic output contract guard (non-semantic) -------------
  output_contract_guard:
    _type: output_contract_guard
    max_recommendations: 3
    description: "Validate and normalize final recommendation output contract"

  # -- Composed control flow ---------------------------------------------------
  parallel_analysis:
    _type: parallel_executor
    tool_list: [user_understanding_agent, nli_agent]
    detailed_logs: true
    return_error_on_exception: true
    description: "Run user understanding and NLI analysis in parallel"

# -- Main workflow: Sequential(RAG → Parallel → CSA → IRA → Guard) ------------
workflow:
  _type: sequential_executor
  verbose: true
  tool_list: [rag_retriever, parallel_analysis, context_summary_agent, item_ranker_agent, output_contract_guard]
  raise_type_incompatibility: false
  description: "ARAG: Agentic RAG for Personalized Recommendation"

# =============================================================================
# EVALUATION & PROFILING
# Run with: nat eval --config_file configs/recommendation.yml
# =============================================================================
eval:
  general:
    output_dir: ./.tmp/eval/recommendation_agent
    verbose: true
    max_concurrency: 2
    dataset:
      _type: json
      file_path: data/eval/recommendation_eval.json
      id_key: "id"
      structure:
        question_key: question
        answer_key: answer
    profiler:
      token_uniqueness_forecast: true
      workflow_runtime_forecast: true
      compute_llm_metrics: true
      csv_exclude_io_text: true
      prompt_caching_prefixes:
        enable: true
        min_frequency: 0.1
      bottleneck_analysis:
        enable_nested_stack: true
      concurrency_spike_analysis:
        enable: true
        spike_threshold: 5

  evaluators:
    accuracy:
      _type: ragas
      metric: AnswerAccuracy
      llm_name: nim_eval_llm
    trajectory:
      _type: trajectory
      llm_name: nim_trajectory_eval_llm
